on: [push, pull_request, workflow_dispatch]
name: Tests
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - uses: actions/checkout@v6
    - run: go test -tags=online,e2e ./...
      env:
        M2T_GITHUB: ${{ secrets.M2T_GITHUB }}
